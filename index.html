<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bharath Kunamneni — Resume</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500&display=swap" rel="stylesheet">
<style>
  :root{
    --sidebar-bg:#EEF3FA;
    --navy:#1B4B77;
    --pill-bg:#E1ECFB;
    --ink:#262626;
    --gray-date:#6B7280;
    --dotted:#C7CED8;
    --page-w:210mm;
    --page-h:297mm;
    --margin-top:14mm;
    --margin-right:12mm;
    --margin-bottom:10mm;
    --margin-left:10mm;
    --sidebar-w:74mm;
    --gutter-w:6mm;
    --font:'Poppins','Century Gothic','Apple Gothic';
    --accent:#6C5CE7;
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0;
    padding:0;
    background:#e9e9ee;
    font-family:var(--font);
    -webkit-font-smoothing:antialiased;
  }

  /* ===== App shell: form panel + resume ===== */
  .app-shell{
    display:flex;
    align-items:flex-start;
    min-height:100vh;
  }

  /* ===== Left form panel (screen only) ===== */
  .form-panel{
    width:400px;
    flex:0 0 400px;
    height:100vh;
    overflow-y:auto;
    position:sticky;
    top:0;
    background:#ffffff;
    border-right:1px solid #e4e4ec;
    padding:24px 22px 60px;
  }
  .form-panel h2{
    font-size:14pt;
    font-weight:700;
    margin:0 0 4px;
  }
  .form-panel > p.hint{
    font-size:9pt;
    color:#8a8a97;
    margin:0 0 22px;
    line-height:13pt;
  }

  .form-section{
    margin-bottom:24px;
    padding-bottom:20px;
    border-bottom:1px solid #eee;
  }
  .form-section:last-child{ border-bottom:none; }
  .form-section h3{
    font-size:10pt;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.6pt;
    color:#444;
    margin:0 0 12px;
  }

  .field{ margin-bottom:12px; }
  .field:last-child{ margin-bottom:0; }
  .field label{
    display:block;
    font-size:8.5pt;
    color:#8a8a97;
    margin-bottom:4px;
  }
  .field-row{ display:flex; gap:8px; }
  .field-row .field{ flex:1; margin-bottom:12px; }

  input[type="text"], textarea{
    width:100%;
    font-family:var(--font);
    font-size:10pt;
    padding:8px 10px;
    border:1px solid #dcdce4;
    border-radius:6px;
    background:#fff;
    color:#222;
  }
  textarea{ resize:vertical; min-height:56px; line-height:14pt; }
  input[type="text"]:focus, textarea:focus{
    outline:none;
    border-color:var(--accent);
    box-shadow:0 0 0 3px rgba(108,92,231,0.12);
  }

  .exp-block{
    position:relative;
    border:1px solid #e6e6ee;
    background:#fafafe;
    border-radius:8px;
    padding:14px 14px 12px;
    margin-bottom:14px;
  }
  .exp-block .remove-btn{
    position:absolute;
    top:8px;
    right:8px;
    width:22px;
    height:22px;
    border:none;
    background:none;
    color:#aaa;
    font-size:13px;
    line-height:1;
    cursor:pointer;
    border-radius:50%;
  }
  .exp-block .remove-btn:hover{ color:#fff; background:#e05a5a; }

  .add-exp-btn{
    width:100%;
    padding:10px;
    border:1.5px dashed var(--accent);
    background:#fff;
    color:var(--accent);
    border-radius:8px;
    cursor:pointer;
    font-family:var(--font);
    font-weight:600;
    font-size:10pt;
  }
  .add-exp-btn:hover{ background:#f5f3ff; }

  /* ===== Resume side ===== */
  .resume-wrap{
    flex:1 1 auto;
    min-width:0;
  }

  #pagesContainer{
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  /* ===== Page shell (A4) ===== */
  .page{
    width:var(--page-w);
    min-height:var(--page-h);
    margin:24px auto;
    background:#ffffff;
    position:relative;
    box-shadow:0 4px 24px rgba(0,0,0,0.15);
    display:flex;
    overflow:visible;
  }

  /* ===== Left sidebar (full-bleed, stretches to page height) ===== */
  .sidebar{
    width:var(--sidebar-w);
    flex:0 0 var(--sidebar-w);
    background:var(--sidebar-bg);
    padding:var(--margin-top) 5mm var(--margin-bottom) var(--margin-left);
    color:var(--ink);
  }

  .gutter{
    width:var(--gutter-w);
    flex:0 0 var(--gutter-w);
  }

  .main{
    flex:1 1 auto;
    padding:var(--margin-top) var(--margin-right) var(--margin-bottom) 0;
    color:var(--ink);
    min-width:0;
  }

  /* ===== Name / Title block ===== */
  .name{
    font-weight:800;
    font-size:25pt;
    line-height:27pt;
    letter-spacing:0.2pt;
    text-transform:uppercase;
    margin:0 0 4pt 0;
    color:var(--navy);
  }
  .name span{ display:block; }

  .role-title{
    font-weight:700;
    font-size:11pt;
    letter-spacing:1pt;
    color:var(--navy);
    margin:0;
  }
  .role-title::after{
    content:"";
    display:block;
    width:20mm;
    height:2px;
    background:var(--navy);
    margin-top:9pt;
    margin-bottom: 20pt;
    opacity: .25;
  }

  /* ===== Icon-badge section headings (icon circle + text + line + dot) ===== */
  .section-heading-row{
    display:flex;
    align-items:center;
    gap:6pt;
    margin-bottom:9pt;
  }
  .icon-badge{
    width:19pt;
    height:19pt;
    border-radius:50%;
    border:1.3pt solid var(--navy);
    display:flex;
    align-items:center;
    justify-content:center;
    flex:0 0 19pt;
    color:var(--navy);
    background:#fff;
  }
  .icon-badge svg{ width:10pt; height:10pt; display:block; }
  .section-heading-text{
    font-weight:700;
    font-size:11.5pt;
    text-transform:uppercase;
    letter-spacing:0.8pt;
    color:var(--navy);
    white-space:nowrap;
  }
  .heading-line{
    flex:1 1 auto;
    height:1.2pt;
    background:var(--navy);
    margin-left:4pt;
    opacity: .25;
  }
  .heading-dot{
    width:4pt;
    height:4pt;
    border-radius:50%;
    background:var(--navy);
    flex:0 0 4pt;
    margin-left:-6pt;
    opacity: .25;
  }

  .sidebar .section-block{ margin-bottom:16pt; }
  .sidebar .section-block:last-child{ margin-bottom:0; }
  .main > .section-block{ margin-bottom:16pt; }

  /* ===== Contact list (icon + text rows) ===== */
  ul.contact-list{
    list-style:none;
    margin:0;
    padding:0;
    margin-left: 2pt;
  }
  ul.contact-list li{
    display:flex;
    align-items:flex-start;
    gap:6pt;
    font-size:9.5pt;
    line-height:1.4;
    margin-bottom:7pt;
    word-break:break-word;
  }
  ul.contact-list li:last-child{ margin-bottom:0; }
  ul.contact-list li a{ color:var(--ink); text-decoration:none; }
  .mini-icon{
    width:11pt;
    height:11pt;
    flex:0 0 11pt;
    color:var(--navy);
    margin-top:1.5pt;
  }
  .mini-icon svg{ width:100%; height:100%; display:block; }

  /* ===== Skills (grouped) ===== */
  .skill-group{ margin-bottom:11pt; margin-left: 2pt;}
  .skill-group:last-child{ margin-bottom:0; }
  .skill-group-title{
    display:flex;
    align-items:center;
    gap:5pt;
    font-weight:700;
    font-size:9pt;
    text-transform:uppercase;
    letter-spacing:0.5pt;
    color:var(--ink);
    margin-bottom:4pt;
  }
  .skill-group-title .dot{
    width:5pt;
    height:5pt;
    border-radius:50%;
    background:var(--navy);
    flex:0 0 5pt;
  }
  ul.skills-list{
    list-style:none;
    margin:0;
    padding:0;
  }
  ul.skills-list li{
    position:relative;
    font-size:9.5pt;
    line-height:1.55;
    color:var(--ink);
    padding-left:10pt;
  }
  ul.skills-list li::before{
    content:"";
    position:absolute;
    left:0;
    top:6.5pt;
    width:3pt;
    height:3pt;
    border-radius:50%;
    background:var(--navy);
  }

  /* ===== Education / Certifications ===== */
  .edu-school{
    font-weight:700;
    font-size:10.5pt;
    margin:0 0 2pt 2pt;
    color:var(--ink);
  }
  .edu-degree{
    font-size:9.5pt;
    margin:0 0 1pt 2pt;
    color:var(--ink);
  }
  .edu-year{
    font-size:9.5pt;
    color:var(--gray-date);
    font-style:italic;
    margin:0 0 3pt 2pt;
  }
  .edu-location{
    display:flex;
    align-items:center;
    gap:5pt;
    font-size:9pt;
    color:var(--gray-date);
    margin:0 0 0 2pt;
  }
  .edu-location .mini-icon{ margin-top:0; }

  .cert-entry{ margin-bottom:10pt; }
  .cert-entry:last-child{ margin-bottom:0; }

  /* ===== Summary paragraph ===== */
  .summary{
    font-size:10.5pt;
    line-height:1.55;
    margin:0;
    color:var(--ink);
  }

  /* ===== Experience entries ===== */
  .job-divider{
    border-top:1.2pt dashed var(--dotted);
    margin:0 0 10pt 0;
  }
  .job{ margin-bottom:0; }
  .job:last-child{
    page-break-inside:avoid;
    break-inside:avoid;
  }
  .job-row{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    gap:10pt;
  }
  .job-role{
    font-weight:700;
    font-size:11.5pt;
    color:var(--ink);
  }
  .job-company{
    font-weight:600;
    font-size:10pt;
    color:var(--navy);
    margin-top:1pt;
  }
  .job-meta{
    display:flex;
    align-items:center;
    gap:4pt;
    font-size:8.5pt;
    color:var(--gray-date);
    white-space:nowrap;
    flex:0 0 auto;
  }
  .job-meta svg{ width:9pt; height:9pt; display:block; }
  .job-client-line{
    font-style:italic;
    font-size:9pt;
    color:var(--gray-date);
    margin:3pt 0 0 0;
  }

  .tags-row{
    margin:8pt 0 9pt 0;
    display:flex;
    flex-wrap:wrap;
    gap:5pt;
  }
  .tag-pill{
    background:var(--pill-bg);
    color:var(--navy);
    font-size:8pt;
    font-weight:600;
    padding:3pt 8pt;
    border-radius:9pt;
  }

  ul.job-bullets{
    list-style:none;
    margin:0;
    padding:0;
  }
  ul.job-bullets li{
    position:relative;
    font-size:9.5pt;
    line-height:1.45;
    padding-left:12pt;
    margin-bottom:4pt;
    color:var(--ink);
  }
  ul.job-bullets li::before{
    content:"";
    position:absolute;
    left:1pt;
    top:6pt;
    width:3.5pt;
    height:3.5pt;
    border-radius:50%;
    background:var(--navy);
  }
  ul.job-bullets li:last-child{ margin-bottom:0; }

  /* ===== Export button (screen only) ===== */
  .export-bar{
    display:flex;
    justify-content:center;
    padding:0 0 40px 0;
  }
  #exportPdfBtn{
    font-family:var(--font);
    font-size:11pt;
    font-weight:600;
    letter-spacing:0.3pt;
    color:#fff;
    background:var(--accent);
    border:none;
    border-radius:8px;
    padding:12px 28px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(108,92,231,0.35);
    transition:transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
  }
  #exportPdfBtn:hover{
    background:#5b4bd6;
    transform:translateY(-1px);
    box-shadow:0 6px 18px rgba(108,92,231,0.45);
  }
  #exportPdfBtn:active{ transform:translateY(0); }
  #exportPdfBtn:disabled{
    opacity:0.6;
    cursor:default;
    transform:none;
  }

  @media (max-width: 900px){
    .app-shell{ flex-direction:column; }
    .form-panel{
      width:100%;
      flex:0 0 auto;
      height:auto;
      position:relative;
      border-right:none;
      border-bottom:1px solid #e4e4ec;
    }
  }

  /* ===== Print styles ===== */
  @page{
    size:A4;
    margin:0;
  }
  @media print{
    html,body{
      background:#fff;
      height:auto;
    }
    *{
      -webkit-print-color-adjust:exact;
      print-color-adjust:exact;
      color-adjust:exact;
    }
    .form-panel{ display:none; }
    .app-shell{ display:block; height:auto; }
    .resume-wrap{ width:100%; height:auto; }
    #pagesContainer{ display:block; }
    .page{
      margin:0;
      box-shadow:none;
      width:var(--page-w);
      height:var(--page-h);
      min-height:0;
      overflow:hidden;
    }
    .page + .page{
      page-break-before:always;
      break-before:page;
    }
    .job,
    .sidebar .section-block{
      page-break-inside:avoid;
      break-inside:avoid;
    }
    .export-bar{ display:none; }
  }
</style>
</head>
<body>

<div class="app-shell">

  <!-- ===================== FORM PANEL ===================== -->
  <aside class="form-panel">
    <h2>Edit Resume</h2>
    <p class="hint">Changes update the resume on the right instantly.</p>

    <div class="form-section">
      <h3>Basic Info</h3>
      <div class="field-row">
        <div class="field">
          <label for="fFirstName">First Name</label>
          <input type="text" id="fFirstName" value="Bharath">
        </div>
        <div class="field">
          <label for="fLastName">Last Name</label>
          <input type="text" id="fLastName" value="Kunamneni">
        </div>
      </div>
      <div class="field">
        <label for="fRoleTitle">Role Title</label>
        <input type="text" id="fRoleTitle" value="Senior Frontend Developer">
      </div>
      <div class="field">
        <label for="fSummary">Professional Summary</label>
        <textarea id="fSummary" rows="6">Senior Frontend Engineer with 10+ years of experience building scalable, performant web applications using React, TypeScript, and modern frontend technologies. Passionate about creating fast, accessible, and intuitive user experiences while staying current with evolving web standards, tooling, and best practices. Experienced in collaborating with global teams to deliver high-quality products from concept to production.</textarea>
      </div>
      <div class="field">
        <label for="fAchievements">Key Accomplishments (one per line)</label>
        <textarea id="fAchievements" rows="5"
          placeholder="One accomplishment per line"></textarea>
      </div>
    </div>

    <div class="form-section">
      <h3>Contact</h3>
      <div class="field">
        <label for="fContact">Items, separated by commas</label>
        <textarea id="fContact" rows="4">bbugs35@gmail.com, +91 90668 18774, https://linkedin.com/in/bharathkunamneni, bharathkunamneni.com, Bangalore India</textarea>
      </div>
    </div>

    <div class="form-section">
      <h3>Skills</h3>
      <p class="hint" style="margin:0 0 12px;">Each group has a title and comma-separated items.</p>
      <div id="skillGroupForm"></div>
      <button type="button" class="add-exp-btn" id="addSkillGroupBtn">+ Add Skill Group</button>
    </div>

    <div class="form-section">
      <h3>Certifications</h3>
      <div id="certificationForm"></div>
      <button type="button" class="add-exp-btn" id="addCertBtn">+ Add Certification</button>
    </div>

    <div class="form-section">
      <h3>Education</h3>
      <div class="field">
        <label for="fEduSchool">School / Degree title</label>
        <input type="text" id="fEduSchool" value="Bachelor of Technology">
      </div>
      <div class="field">
        <label for="fEduDegree">Field of study</label>
        <input type="text" id="fEduDegree" value="Computer Science &amp; Engineering">
      </div>
      <div class="field">
        <label for="fEduYear">Years</label>
        <input type="text" id="fEduYear" value="2010 - 2014">
      </div>
      <div class="field">
        <label for="fEduLocation">Location</label>
        <input type="text" id="fEduLocation" value="India">
      </div>
    </div>

    <div class="form-section">
      <h3>Experience</h3>
      <div id="experienceForm"></div>
      <button type="button" class="add-exp-btn" id="addExpBtn">+ Add Company</button>
    </div>
  </aside>

  <!-- ===================== RESUME (built dynamically as N pages) ===================== -->
  <div class="resume-wrap">

    <div id="pagesContainer"></div>

    <div class="export-bar">
      <button id="exportPdfBtn" type="button">Download as PDF</button>
    </div>

  </div>

</div>

<!-- hidden probes used to measure real rendered pixel sizes for pagination -->
<div id="mmProbe" style="position:absolute; visibility:hidden; left:-99999px; top:0; width:0; height:100mm;"></div>
<div id="mainProbe" style="position:absolute; visibility:hidden; left:-99999px; top:0; overflow:hidden;"></div>

  // ---------- helpers ----------
  function escapeHtml(str){
    return String(str == null ? '' : str)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;')
      .replace(/'/g,'&#39;');
  }

  function parseCommaList(value){
    return value.split(',').map(function(s){ return s.trim(); }).filter(Boolean);
  }

  function sectionHeadingHtml(iconKey, text){
    return '<div class="section-heading-row">' +
      '<span class="icon-badge">' + ICONS[iconKey] + '</span>' +
      '<span class="section-heading-text">' + escapeHtml(text) + '</span>' +
      '<span class="heading-line"></span>' +
      '<span class="heading-dot"></span>' +
      '</div>';
  }

  // Detects a reasonable icon + clickable label for each free-text contact item.
  function contactListHtml(value){
    return parseCommaList(value).map(function(item){
      var icon = 'pin';
      var inner = escapeHtml(item);

      if (/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(item)){
        icon = 'mail';
        inner = '<a href="mailto:' + escapeHtml(item) + '">' + escapeHtml(item) + '</a>';
      } else if (/^[+\d][\d\s().-]{5,}$/.test(item)){
        icon = 'phone';
      } else if (/linkedin\.com/i.test(item)){
        icon = 'link';
        var href1 = /^https?:\/\//i.test(item) ? item : 'https://' + item.replace(/^\/\//,'');
        inner = '<a href="' + escapeHtml(href1) + '" target="_blank" rel="noopener">' + escapeHtml(item.replace(/^https?:\/\//i,'')) + '</a>';
      } else if (/github\.com/i.test(item)){
        icon = 'branch';
        var href2 = /^https?:\/\//i.test(item) ? item : 'https://' + item.replace(/^\/\//,'');
        inner = '<a href="' + escapeHtml(href2) + '" target="_blank" rel="noopener">' + escapeHtml(item.replace(/^https?:\/\//i,'')) + '</a>';
      } else if (/^https?:\/\//i.test(item) || /^[\w-]+(\.[\w-]+)+(\/\S*)?$/i.test(item)){
        icon = 'globe';
        var href3 = /^https?:\/\//i.test(item) ? item : 'https://' + item.replace(/^\/\//,'');
        inner = '<a href="' + escapeHtml(href3) + '" target="_blank" rel="noopener">' + escapeHtml(item.replace(/^https?:\/\//i,'')) + '</a>';
      }

      return '<li><span class="mini-icon">' + ICONS[icon] + '</span><span>' + inner + '</span></li>';
    }).join('');
  }

  function jobHtml(exp, isFirst){
    var bullets = (exp.bullets || []).map(function(b){ return '<li>' + escapeHtml(b) + '</li>'; }).join('');
    var clientLine = (exp.client && exp.client.trim())
      ? '<p class="job-client-line">' + escapeHtml(exp.client) + '</p>'
      : '';
    var datesMeta = (exp.dates && exp.dates.trim())
      ? '<span class="job-meta">' + ICONS.calendar + '<span>' + escapeHtml(exp.dates) + '</span></span>'
      : '';
    var locationMeta = (exp.location && exp.location.trim())
      ? '<span class="job-meta">' + ICONS.pin + '<span>' + escapeHtml(exp.location) + '</span></span>'
      : '';
    var tags = parseCommaList(exp.tags || '');
    var tagsHtml = tags.length
      ? '<div class="tags-row">' + tags.map(function(t){ return '<span class="tag-pill">' + escapeHtml(t) + '</span>'; }).join('') + '</div>'
      : '';
    var dividerHtml = isFirst ? '' : '<div class="job-divider"></div>';

    return dividerHtml + '<div class="job">' +
      '<div class="job-row"><span class="job-role">' + escapeHtml(exp.role) + '</span>' + datesMeta + '</div>' +
      '<div class="job-row"><span class="job-company">' + escapeHtml(exp.company) + '</span>' + locationMeta + '</div>' +
      clientLine +
      tagsHtml +
      '<ul class="job-bullets">' + bullets + '</ul>' +
      '</div>';
  }

  // Sidebar content as atomic, unsplittable blocks so the pagination engine
  // can flow overflow (e.g. many certifications) onto a fresh page.
  function buildSidebarHeadBlocks(data){
    var blocks = [];

    if (data.skillGroups.length){

        var groupHtml = '<div class="skill-group"><div class="skill-group-title"><span class="dot"></span>' + escapeHtml(group.title) + '</div><ul class="skills-list">' + itemsHtml + '</ul></div>';

  // forceBreak: if true, the first block returned here (whichever section
  // comes right after Skills) gets flagged so the pagination engine starts
  // it on a fresh page instead of squeezing it into leftover space.
  function buildSidebarTailBlocks(data, forceBreak){
    var blocks = [];
    var isFirst = true;

    if (data.certifications.length){
      data.certifications.forEach(function(cert, i){
        var entry = '<div class="cert-entry">' +

        var html = (i === 0)
          ? '<div class="section-block">' + sectionHeadingHtml('award', 'Certifications') + entry + '</div>'
          : '<div class="section-block">' + entry + '</div>';
        blocks.push({ html: html, breakBefore: isFirst && forceBreak });
        isFirst = false;
      });
    }

    var eduLocationHtml = (data.eduLocation && data.eduLocation.trim())
      ? '<p class="edu-location"><span class="mini-icon">' + ICONS.pin + '</span><span>' + escapeHtml(data.eduLocation) + '</span></p>'

    var eduHtml =

      '<p class="edu-degree">' + escapeHtml(data.eduDegree) + '</p>' +
      '<p class="edu-year">' + escapeHtml(data.eduYear) + '</p>' +
      eduLocationHtml +
      '</div>';
    blocks.push({ html: eduHtml, breakBefore: isFirst && forceBreak });

    return blocks;
  }

function buildMainBlocks(data){
  var blocks = [];

  // Professional Summary
  blocks.push(
    '<div class="section-block">' +
      sectionHeadingHtml('person', 'Professional Summary') +
      '<p class="summary">' + escapeHtml(data.summary) + '</p>' +

  if (data.experiences.length === 0){

}

  // ---------- pagination engine ----------
  var mmProbe = document.getElementById('mmProbe');
  var mainProbe = document.getElementById('mainProbe');

  function getPxPerMm(){
    return mmProbe.getBoundingClientRect().height / 100;
  }

  function measureBlockHeightPx(html, widthPx){
    mainProbe.style.width = widthPx + 'px';
    mainProbe.innerHTML = html;
    var h = Math.ceil(mainProbe.getBoundingClientRect().height);
    mainProbe.innerHTML = '';
    return h;
  }

  // Accepts either plain HTML strings or { html, breakBefore } objects.
  // breakBefore forces a new page even if the block would still fit,
  // used to avoid squeezing a section into a tiny sliver of leftover space.
  function paginateBlocks(blocks, widthPx, availableHeightPx){
    var pages = [];
    var current = [];
    var currentHeight = 0;

    blocks.forEach(function(block){
      var html = (typeof block === 'string') ? block : block.html;
      var breakBefore = (typeof block === 'object') && block.breakBefore;
      var h = measureBlockHeightPx(html, widthPx);
      var mustBreak = breakBefore && current.length > 0;
      if (current.length > 0 && (mustBreak || currentHeight + h > availableHeightPx)){
        pages.push(current);
        current = [];
        currentHeight = 0;
      }
      current.push(html);
      currentHeight += h;
    });
    pages.push(current);

    return pages;
  }

  function sumBlockHeights(blocks, widthPx){
    return blocks.reduce(function(total, blockHtml){
      return total + measureBlockHeightPx(blockHtml, widthPx);
    }, 0);
  }

  function buildPages(data){
    var pxPerMm = getPxPerMm();
    var mainWidthMm = 210 - 74 - 6 - 12;   // page - sidebar - gutter - right margin
    var sidebarWidthMm = 74 - 5 - 10;      // sidebar - its own right padding - left margin/padding
    var mainWidthPx = pxPerMm * mainWidthMm;
    var sidebarWidthPx = pxPerMm * sidebarWidthMm;
    var pageHeightPx = pxPerMm * 297;
    var marginTopPx = pxPerMm * 14;
    var marginBottomPx = pxPerMm * 10;
    var safetyBufferPx = pxPerMm * 5;
    var availableHeightPx = pageHeightPx - marginTopPx - marginBottomPx - safetyBufferPx;

    var mainPages = paginateBlocks(buildMainBlocks(data), mainWidthPx, availableHeightPx);
    var mainNeedsMultiplePages = mainPages.length > 1;

    var sidebarHeadBlocks = buildSidebarHeadBlocks(data);
    var headHeightPx = sumBlockHeights(sidebarHeadBlocks, sidebarWidthPx);

    // If Skills alone already fills most of a page, and the resume already
    // needs a second page anyway (because Experience overflowed), push
    // Certifications/Education onto that second page's sidebar instead of
    // cramming them into whatever sliver of page 1 is left.
    var forceBreakAfterSkills = mainNeedsMultiplePages && headHeightPx >= 0.7 * availableHeightPx;

    var sidebarTailBlocks = buildSidebarTailBlocks(data, forceBreakAfterSkills);
    var sidebarBlocks = sidebarHeadBlocks.concat(sidebarTailBlocks);
    var sidebarPages = paginateBlocks(sidebarBlocks, sidebarWidthPx, availableHeightPx);

    var pageCount = Math.max(mainPages.length, sidebarPages.length);
    var pages = [];
    for (var i = 0; i < pageCount; i++){
      pages.push({
        sidebar: sidebarPages[i] ? sidebarPages[i].join('') : '',
        main: mainPages[i] ? mainPages[i].join('') : ''
      });
    }
    return pages;
  }

      '<button type="button" class="remove-btn" title="Remove this certification">&#10005;</button>' +
      '<div class="field">' +
        '<label>Certification Name</label>' +
        '<input type="text" class="cert-name" value="' + escapeHtml(entry.name) + '" placeholder="e.g. AWS Certified Developer">' +
      '</div>' +
      '<div class="field">' +
        '<label>Provider</label>' +
        '<input type="text" class="cert-provider" value="' + escapeHtml(entry.provider) + '" placeholder="e.g. Amazon Web Services">' +
      '</div>' +
      '<div class="field">' +
        '<label>Valid Till</label>' +
        '<input type="text" class="cert-valid" value="' + escapeHtml(entry.validTill) + '" placeholder="e.g. 2027 or No Expiry">' +
      '</div>';
    certificationForm.appendChild(block);

    block.querySelector('.cert-name').addEventListener('input', function(e){ entry.name = e.target.value; renderResume(); });
    block.querySelector('.cert-provider').addEventListener('input', function(e){ entry.provider = e.target.value; renderResume(); });
    block.querySelector('.cert-valid').addEventListener('input', function(e){ entry.validTill = e.target.value; renderResume(); });
    block.querySelector('.remove-btn').addEventListener('click', function(){
      var idx = certificationData.indexOf(entry);
      if (idx > -1) certificationData.splice(idx, 1);
      block.remove();
      renderResume();
    });

    renderResume();
  }

  addCertBtn.addEventListener('click', function(){ addCertification(); });

  // re-paginate once web fonts finish loading, since font metrics affect
  // measured block heights (and therefore where pages break)
  if (document.fonts && document.fonts.ready){
    document.fonts.ready.then(renderResume);
  }
  window.addEventListener('load', renderResume);

  // ---------- PDF export (native print) ----------
  document.getElementById('exportPdfBtn').addEventListener('click', function () {
    renderResume();
    window.print();
  });
</script>

</body>
</html>
